# Deploys Designer + QA ADK agents to Vertex AI Agent Engine in
# agentic-system-488914, then writes their resource names to
# proxy/deployed_engines.json (the proxy build step picks that up).
#
# Run: gcloud builds submit . --config=agents/cloudbuild.yaml \
#         --project=agentic-system-488914
#
# Project layout uploaded to Cloud Build is the repo root, so the proxy/
# directory is also available for the second step.

steps:
  - id: deploy-agents
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -ceux
      - |
        pip install --no-cache-dir -r agents/requirements.txt
        cd agents
        OUTPUT_PATH=/workspace/proxy/deployed_engines.json \
        GCP_PROJECT=$PROJECT_ID \
        GCP_LOCATION=us-central1 \
        STAGING_BUCKET=gs://$PROJECT_ID-agent-staging \
        python deploy.py
        echo "---- deployed_engines.json ----"
        cat /workspace/proxy/deployed_engines.json

  - id: deploy-proxy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceux
      - |
        cd proxy
        gcloud run deploy googlive-agents \
          --source . \
          --project $PROJECT_ID \
          --region us-central1 \
          --port 8080 \
          --allow-unauthenticated \
          --set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_LOCATION=us-central1,ALLOWED_ORIGIN=$_ALLOWED_ORIGIN \
          --memory 1Gi \
          --cpu 1 \
          --quiet

substitutions:
  _ALLOWED_ORIGIN: https://googlive-jhixfhddya-uc.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
