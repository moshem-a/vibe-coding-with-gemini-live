<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Live · Demo Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500&family=Google+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#4285F4"/>
          <stop offset="35%" stop-color="#9B72CB"/>
          <stop offset="70%" stop-color="#D96570"/>
          <stop offset="100%" stop-color="#F9AB00"/>
        </linearGradient>
      </defs>
      <rect width="100" height="100" rx="22" fill="url(#g)"/>
      <path d="M50 32l5.5 14L70 50l-14.5 4L50 68l-5.5-14L30 50l14.5-4z" fill="white"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Generated by serve.py / Cloud Run entrypoint: defines window.__GEMINI_API_KEY -->
  <script src="config.local.js"></script>

  <!-- Audio + Gemini Live client (plain JS) -->
  <script src="audio.js"></script>
  <script src="gemini-live.js"></script>
  <script src="sub-agents.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script>
    if (window.mermaid) {
      window.mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        themeVariables: {
          fontFamily: "Google Sans, Google Sans Text, sans-serif",
          fontSize: "14px",
          primaryColor: "#E8F0FE",
          primaryTextColor: "#202124",
          primaryBorderColor: "#1A73E8",
          secondaryColor: "#FEF7E0",
          tertiaryColor: "#FCE8E6",
          lineColor: "#5F6368",
          textColor: "#202124",
          mainBkg: "#FFFFFF",
          nodeBorder: "#DADCE0",
          clusterBkg: "#F8F9FA",
          clusterBorder: "#DADCE0",
          edgeLabelBackground: "#FFFFFF"
        },
        flowchart: { curve: "basis", padding: 18, htmlLabels: true, useMaxWidth: true }
      });
    }
  </script>

  <!-- React app (Babel-transpiled JSX) -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="gcp-icons.jsx"></script>
  <script type="text/babel" src="hub.jsx"></script>
  <script type="text/babel" src="scenario-architect.jsx"></script>
  <script type="text/babel" src="scenario-survey.jsx"></script>
  <script type="text/babel" src="scenario-code.jsx"></script>
  <script type="text/babel" src="scenario-translate.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
