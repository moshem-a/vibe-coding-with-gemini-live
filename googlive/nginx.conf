server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # App code is loaded raw (no bundler, no fingerprinting) — never cache it,
  # otherwise model-ID or scenario changes can't reach users until cache expires.
  location ~* \.(html|jsx|js|css)$ {
    add_header Cache-Control "no-store, must-revalidate";
    expires -1;
  }
  # Static binary assets — safe to cache.
  location ~* \.(woff2?|ttf|svg|png|jpg|ico)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
